name: Build & Push Docker images (Docker Hub)

# ─────────────────────────────────────────────────────────────
#  Secrets required (Settings → Secrets and variables → Actions)
#  DOCKERHUB_TOKEN    : Docker Hub Access Token
#                       (Account Settings → Security → New Access Token)
#
#  Variables required (Settings → Secrets and variables → Actions → Variables)
#             : your Docker Hub username
#  DOCKERHUB_REPO_BACKEND      : e.g. myusername/myapp-backend
#  DOCKERHUB_REPO_FRONTEND     : e.g. myusername/myapp-frontend
# ─────────────────────────────────────────────────────────────

on:
  workflow_dispatch:          # manual trigger
  push:
    branches:
      - keyrus
    tags:
      - 'v*'                  # e.g. v1.0.0

jobs:
  # ────────────────────────────────────────────────
  #  BACKEND IMAGE
  # ────────────────────────────────────────────────
  build-backend:
    name: Build & Push – Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_REPO }}
          tags: |
            # branch → tag of the same name  (e.g. keyrus, dev)
            type=ref,event=branch,prefix=back-
            # git tag → semantic version  (e.g. v1.2.3 → 1.2.3 and 1.2)
            type=semver,pattern=back-{{version}}
            type=semver,pattern=back-{{major}}.{{minor}}
            # short sha  (e.g. git-abc1234)
            type=sha,prefix=git-back-
            # latest only on keyrus branch
            type=raw,value=back-latest,enable=${{ github.ref == 'refs/heads/keyrus' }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            BUILD_HASH=${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max


