name: Build & Push Docker images (GitLab Container Registry)

# ─────────────────────────────────────────────────────────────
#  Secrets required (Settings → Secrets and variables → Actions)
#  GITLAB_TOKEN    : GitLab Personal Access Token
#                   scopes requis : read_registry + write_registry
#
#  Variables required (Settings → Secrets and variables → Actions → Variables)
#  GITLAB_USERNAME          : ton nom d'utilisateur GitLab
#  GITLAB_REGISTRY_BACKEND  : ex. registry.gitlab.com/mon-groupe/open-webui/backend
#  GITLAB_REGISTRY_FRONTEND : ex. registry.gitlab.com/mon-groupe/open-webui/frontend
# ─────────────────────────────────────────────────────────────

on:
  workflow_dispatch:          # déclenchement manuel
  push:
    branches:
      - keyrus
    tags:
      - 'v*'                  # ex. v1.0.0

env:
  REGISTRY: registry.gitlab.com

jobs:
  # ────────────────────────────────────────────────
  #  IMAGE BACKEND
  # ────────────────────────────────────────────────
  build-backend:
    name: Build & Push – Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitLab Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.GITLAB_REGISTRY_BACKEND }}
          tags: |
            # branche → tag du même nom  (ex. keyrus, dev)
            type=ref,event=branch
            # tag git → version sémantique  (ex. v1.2.3 → 1.2.3 et 1.2)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # sha court  (ex. git-abc1234)
            type=sha,prefix=git-
            # latest uniquement sur keyrus
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/keyrus' }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            BUILD_HASH=${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max


  # ────────────────────────────────────────────────
  #  IMAGE FRONTEND
  # ────────────────────────────────────────────────
  build-frontend:
    name: Build & Push – Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitLab Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.GITLAB_REGISTRY_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=git-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/keyrus' }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            BUILD_HASH=${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
